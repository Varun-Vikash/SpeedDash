    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Honda Jazz - BMW Style DRL Only</title>
    <style>
        body {
            background-color: #000;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .dashboard-container {
            width: 90%;
            max-width: 1400px;
        }

        svg {
            width: 100%;
            height: auto;
            display: block; 
        }

        path {
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: all 0.3s ease;
        }

        /* --- 1. BACKGROUND BODY & GRILL (Slightly Visible) --- */
        .wireframe-only path {
            fill: transparent !important; 
            stroke: #ffffff; 
            stroke-width: 1.5;
            /* Increased opacity so it's visible but dim */
            opacity: 0.4; 
            
            stroke-dasharray: 8000; 
            stroke-dashoffset: 8000; 
            
            animation: drawLine 3.0s ease-out forwards;
        }

        /* --- 2. LOGO (Static White, No Glow) --- */
        .static-logo path {
            fill: transparent !important; 
            stroke: #ffffff;   
            stroke-width: 3;
            /* Brighter than background, but not glowing */
            opacity: 0.8;
             
            stroke-dasharray: 8000;
            stroke-dashoffset: 8000; 
            
            /* Only draw, no ignite animation */
            animation: drawLine 2.5s ease-out forwards;
            animation-delay: 0.5s; 
        }

        /* --- 3. DRL: THE BMW "TUBE" GLOW (Background Layer) --- */
        /* REMAINED UNCHANGED */
        .drl-bmw-aura path {
            fill: transparent !important;
            stroke: #0033ff; /* Start with Deep BMW Blue */
            stroke-width: 25; /* Very Thick to simulate a tube */
            opacity: 0;
            filter: blur(15px); /* Heavy Blur */
            
            stroke-dasharray: 8000;
            stroke-dashoffset: 8000;

            animation: 
                drawLine 1.5s cubic-bezier(0.1, 0.7, 1.0, 0.1) forwards, /* Fast sweep */
                bmwStartupColor 2.0s ease-out forwards; /* Blue -> Cyan -> White Sequence */
                
            animation-delay: 0.5s, 1.5s;
        }

        /* --- 4. DRL: THE CORE (Foreground Layer) --- */
        /* REMAINED UNCHANGED */
        .drl-bmw-core path {
            fill: transparent !important;
            stroke: #ffffff; /* Pure White Center */
            stroke-width: 6; 
            opacity: 0;
            
            stroke-dasharray: 8000;
            stroke-dashoffset: 8000;

            animation: 
                drawLine 1.5s cubic-bezier(0.1, 0.7, 1.0, 0.1) forwards,
                bmwCoreFlash 2.0s ease-out forwards;
                
            animation-delay: 0.5s, 1.5s;
        }

        /* --- ANIMATION SEQUENCES --- */

        @keyframes drawLine { 
            to { stroke-dashoffset: 0; } 
        }

        /* The Signature BMW Sequence: Deep Blue -> Pulse -> Bright Cyan */
        @keyframes bmwStartupColor {
            0% {
                opacity: 0;
                stroke: #0011ff; /* Deep Blue start */
                stroke-width: 15;
            }
            20% {
                opacity: 1;
                stroke: #0055ff; /* Brighter Blue */
                stroke-width: 25; /* Expands */
            }
            40% {
                opacity: 0.6; /* Dim slightly (The "Check") */
                stroke: #0088ff;
            }
            60% {
                opacity: 1;
                stroke: #ffffff; /* Cyan Kick in */
                filter: blur(12px);
            }
            100% {
                opacity: 1;
                stroke: #dbfbff; /* Settles on Cyan */
                stroke-width: 25;
                filter: blur(15px); /* Stable Glow */
            }
        }

        /* The Core Line Flash */
        @keyframes bmwCoreFlash {
            0% { opacity: 0; }
            20% { opacity: 1; }
            40% { opacity: 0.5; }
            100% { opacity: 1; filter: drop-shadow(0 0 5px white); }
        }

    </style>
</head>
